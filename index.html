    <title>Magic Care Demo - Simple Cube</title>
    <!-- 1. Load A-Frame (The 3D Engine) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- 2. Load AR.js (The Tracking Engine) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #ui {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 15px;
        text-align: center; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <!-- UI Overlay -->
    <ul>

        <li><a href="https://www.google.com/search?sca_esv=50cf1352f96a1c3e&sxsrf=ANbL-n4IhHcME1ORxIVw7FGiAS6k2mN7SQ:1778919335121&udm=2&fbs=ADc_l-bHuGYqNDo4tYfOTaXehhzrYuhyYxfgZ0ZGDMAyilpe5rFdYhhLSmsUkYZllsil2-SyLcliKZ0RzTNeYBPDCiystZtf2BJMfFNC_FYSQ5YTnejgEss5T0xdwX9Ce6GmSpof70fw7gDyKPQNNrMBMNzNAoQlfDgws4hB_EWM0gnFL3g_17Pm47ov0zM_NBr2w5yJNO_78qiqzwFSUHOaorNVDk8XrQ&q=ar+via+qr&sa=X&ved=2ahUKEwit67b4rr2UAxXylP0HHUn8KTkQtKgLegQIFBAB&biw=360&bih=646&dpr=3#sv=CAMSVxoyKhBlLVNZUm4zdmRXSnpYX09NMg5TWVJuM3ZkV0p6WF9PTToObXNvQlN0Q2tKd1J0SU0gBCoXCgFzEhBlLVNZUm4zdmRXSnpYX09NGAEwAUoECAEQAhgHIPmS6t4OSggQAhgBIAIoAQ"> download hiro marker for this demo </a>   https://beauterre.github.io/MagicCare-ARfromQR/</a>
<\li>
    </ul>
 
    <div id="ui">
      <strong>✨ Magic Care Demo ✨</strong><br>
      Point your camera at the <b>Hiro Marker</b>!
    </div>

    <!-- AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- The Marker: When this is seen, the "contents" inside are shown -->
      <a-marker preset="hiro">
        
        <!-- A Simple Magic Cube -->
        <!-- We add a basic animation to make it rotate -->
        <a-box 
            position="0 0.5 0" 
            material="color: #FF4081; opacity: 0.9;" 
            animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
            shadow="true">
        </a-box>

        <!-- A little "floating" text above the cube -->
        <a-text 
            value="MAGIC!" 
            position="-0.5 1.2 0" 
            color="#000" 
            width="3" 
            align="center">
        </a-text>

      </a-marker>

      <!-- The Camera -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
